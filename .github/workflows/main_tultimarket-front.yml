# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy React app to Azure Web App - tultimarket-front

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: TultiMarket/Marketplace website design

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          npm install --omit=dev --prefix ./deploy serve
          cp package.json ./deploy/package.json
          cp -r dist ./deploy/dist
          node -e "const fs=require('fs'); const p=require('./deploy/package.json'); p.scripts={start:'serve -s dist -l tcp://0.0.0.0:' + (process.env.PORT || 8080)}; p.dependencies={serve:p.dependencies?.serve || '^14.2.4'}; fs.writeFileSync('./deploy/package.json', JSON.stringify(p,null,2));"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: react-app
          path: TultiMarket/Marketplace website design/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: react-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EFFBC442AE9E479F8B9F1CE1838D0C85 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1DD425820C524574B1B4588451EC4922 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1342D8E1D4154D9E9E0975D3A040B433 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tultimarket-front'
          slot-name: 'Production'
          package: .
